<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Estudo Bíblico PWA</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#3b2f25" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <link
    href="https://unpkg.com/vis-timeline@latest/styles/vis-timeline-graph2d.min.css"
    rel="stylesheet"
  />

  <script src="https://unpkg.com/vis-timeline@latest/standalone/umd/vis-timeline-graph2d.min.js"></script>
</head>

<body>
  <header class="app-header">
    <h1>Estudo Bíblico</h1>
    <div id="randomSuggestion" class="random-suggestion"></div>
    <p>Base local de entidades</p>

    <div class="tabs">
      <button data-tab="entities" class="tab active">Entidades</button>
      <button data-tab="time">Períodos</button>
      <button data-tab="relations">Relações</button>
      <button data-tab="timeline">Timeline</button>
      <button data-tab="search">Busca</button>
    </div>
  </header>

  <main class="app-main">

    <!-- ========================= -->
    <!-- ABA ENTIDADES -->
    <!-- ========================= -->
    <div id="tab-entities">
      <section class="card">
        <h2 id="formTitle">Nova entidade</h2>

        <form id="entityForm">
          <input type="hidden" id="entityId" />

          <label>
            Tipo
            <select id="type" required>
              <option value="">Selecione</option>
              <option value="person">Pessoa</option>
              <option value="book">Livro</option>
              <option value="event">Evento</option>
              <option value="place">Lugar</option>
              <option value="people_group">Povo / Grupo</option>
              <option value="role">Cargo / Função</option>
              <option value="period">Período</option>
              <option value="theme">Tema</option>
            </select>
          </label>

          <label>
            Subtipo
            <input id="subtype" placeholder="Ex: cidade, rei, batalha..." />
          </label>

          <label>
            Nome
            <input id="name" required placeholder="Ex: Davi, Jerusalém, 1 Samuel" />
          </label>

          <label>
            Resumo
            <textarea id="summary" rows="3" placeholder="Resumo curto"></textarea>
          </label>

          <label>
            Tags
            <input id="tags" placeholder="Ex: rei|israel|judá" />
          </label>

          <div class="actions">
            <button type="submit" class="primary">Salvar</button>
            <button type="button" id="cancelEdit" class="secondary hidden">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="card">
        <div class="section-title">
          <h2>Entidades</h2>
          <span id="entityCount">0</span>
        </div>

        <input id="searchInput" class="search" placeholder="Buscar..." />

        <select id="filterType" class="search">
          <option value="">Todos os tipos</option>
          <option value="person">Pessoa</option>
          <option value="book">Livro</option>
          <option value="event">Evento</option>
          <option value="place">Lugar</option>
          <option value="people_group">Povo / Grupo</option>
          <option value="role">Cargo</option>
          <option value="period">Período</option>
          <option value="theme">Tema</option>
        </select>

        <input
          id="filterYear"
          type="number"
          class="search"
          placeholder="Filtrar por ano (ex: -1000)"
        />

        <div id="entityList" class="entity-list"></div>
      </section>
    </div>

    <!-- ========================= -->
    <!-- ABA PERÍODOS -->
    <!-- ========================= -->
    <div id="tab-time" class="hidden">
      <section class="card">
        <h2>Períodos</h2>

        <form id="timeSpanForm">
          <input type="hidden" id="timeSpanId" />

          <label>
            Entidade
            <select id="tsEntity"></select>
          </label>

          <label>
            Tipo
            <input id="tsKind" placeholder="Ex: vida, reinado..." />
          </label>

          <label>
            Rótulo
            <input id="tsLabel" placeholder="Ex: Reinado de Davi" />
          </label>

          <label>
            Início (ano)
            <input id="tsStartYear" type="number" />
          </label>

          <label>
            Fim (ano)
            <input id="tsEndYear" type="number" />
          </label>

          <label>
            Aproximado
            <input id="tsApprox" type="checkbox" />
          </label>

          <button type="submit" class="primary">Salvar período</button>
        </form>

        <div id="timeSpanList"></div>
      </section>
    </div>

    <!-- ========================= -->
    <!-- ABA RELAÇÕES -->
    <!-- ========================= -->
    <div id="tab-relations" class="hidden">
      <section class="card">
        <h2>Relações</h2>

        <form id="relationForm">
          <input type="hidden" id="relationId" />

          <label>
            Origem
            <select id="relSource"></select>
          </label>

          <label>
            Tipo de relação
            <select id="relType"></select>
          </label>

          <label>
            Destino
            <select id="relTarget"></select>
          </label>

          <label>
            Observação
            <input id="relNotes" />
          </label>

          <button type="submit" class="primary">Salvar relação</button>
        </form>

        <div id="relationList"></div>
      </section>
    </div>

    <!-- ========================= -->
    <!-- ABA TIMELINE -->
    <!-- ========================= -->
    <div id="tab-timeline" class="hidden">
      <section class="card timeline-card">
        <div class="section-title">
          <h2>Timeline</h2>
          <button type="button" id="refreshTimeline" class="secondary">Atualizar</button>
        </div>

        <label>
          Filtrar timeline
          <select id="timelineTypeFilter">
            <option value="">Todos</option>
            <option value="person">Pessoas</option>
            <option value="event">Eventos</option>
            <option value="book">Livros</option>
            <option value="place">Lugares</option>
            <option value="people_group">Povos / Grupos</option>
            <option value="role">Cargos / Funções</option>
            <option value="period">Períodos</option>
            <option value="theme">Temas</option>
          </select>
        </label>

        <div id="timelineContainer" class="vis-timeline-box"></div>
      </section>
    </div>

    <!-- ========================= -->
    <!-- BUSCA GLOBAL -->
    <!-- ========================= -->

    <div id="tab-search" class="hidden">
  <section class="card">
    <h2>Busca global</h2>

    <input id="globalSearchInput" class="search" placeholder="Buscar em entidades e fontes..." />

    <div id="globalSearchResults"></div>
  </section>
</div>

    <!-- ========================= -->
    <!-- BACKUP -->
    <!-- ========================= -->
    <section class="card">
      <h2>Backup</h2>

      <div class="actions">
        <button type="button" id="backupButton" class="primary">Fazer backup</button>
        <button type="button" id="restoreButton" class="secondary">Restaurar</button>
      </div>

      <p id="backupStatus" class="backup-status"></p>
    </section>

    <section class="card">
      <h2>Arquivo local</h2>

      <div class="actions">
        <button type="button" id="exportJsonButton" class="primary">Baixar JSON</button>
        <button type="button" id="importJsonButton" class="secondary">Importar JSON</button>
      </div>

      <input type="file" id="importJsonInput" accept="application/json" hidden />

      <p id="fileStatus" class="backup-status"></p>
    </section>
  </main>

  <!-- ========================= -->
  <!-- MODAL PERFIL DA ENTIDADE -->
  <!-- ========================= -->
  <div id="entityDetailModal" class="modal hidden">
    <div class="modal-content large">
      <button type="button" id="closeDetail" class="close">✕</button>

      <header class="detail-header">
        <div>
          <h2 id="detailName">Detalhe</h2>
          <span id="detailType" class="badge"></span>
        </div>

        <button type="button" id="editEntityFromDetail" class="secondary">Editar</button>
      </header>

      <p id="detailSummary" class="muted"></p>

      <input type="hidden" id="detailEntityId" />

      <section class="detail-section">
        <div class="section-title">
          <h3>Períodos</h3>
        </div>

        <form id="detailTimeForm" class="inline-form">
          <input id="detailTsKind" placeholder="Tipo (vida, reinado...)" />
          <input id="detailTsLabel" placeholder="Rótulo" />
          <input id="detailTsStart" type="number" placeholder="Início" />
          <input id="detailTsEnd" type="number" placeholder="Fim" />
          <button type="submit" class="primary small">Adicionar</button>
        </form>

        <div id="detailTimeList"></div>
      </section>

<section class="detail-section">
  <div class="section-title">
    <h3>Família</h3>
  </div>

  <div id="detailFamilyBlock"></div>
</section>

      <section class="detail-section">
        <div class="section-title">
          <h3>Relações</h3>
        </div>

        <form id="detailRelationForm" class="inline-form">
          <select id="detailRelationType"></select>
          <select id="detailRelationTarget"></select>
          <button type="submit" class="primary small">Adicionar</button>
        </form>

        <div id="detailRelationList"></div>

      </section>

      <section class="detail-section">
  <div class="section-title">
    <h3>Fontes / Referências</h3>
  </div>

  <form id="detailSourceForm" class="inline-form">
    <select id="detailSourceType">
      <option value="biblical">Bíblica</option>
      <option value="historical">Histórica</option>
      <option value="archaeological">Arqueológica</option>
      <option value="personal_note">Nota pessoal</option>
    </select>

    <input id="detailSourceCitation" placeholder="Referência. Ex: 1 Samuel 16" />
    <input id="detailSourceReference" placeholder="Descrição curta" />
    <input id="detailSourceUrl" placeholder="Link opcional" />

    <button type="submit" class="primary small">Adicionar</button>
  </form>

  <textarea
    id="detailSourceNotes"
    rows="3"
    placeholder="Observações da fonte"
  ></textarea>

  <div id="detailSourceList"></div>
</section>

    </div>
  </div>

<div id="quickSourceModal" class="modal hidden">
  <div class="modal-content">
    <button type="button" id="closeQuickSource" class="close">✕</button>

    <h2>Adicionar fonte</h2>

    <form id="quickSourceForm">
      <input type="hidden" id="quickSourceEntityId" />
      <input type="hidden" id="quickSourceTimeSpanId" />
      <input type="hidden" id="quickSourceRelationId" />

      <label>
        Tipo da fonte
        <select id="quickSourceType">
          <option value="biblical">Bíblica</option>
          <option value="historical">Histórica</option>
          <option value="archaeological">Arqueológica</option>
          <option value="personal_note">Nota pessoal</option>
        </select>
      </label>

      <label>
        Referência
        <input id="quickSourceCitation" placeholder="Ex: 1 Samuel 16" />
      </label>

      <label>
        Descrição curta
        <input id="quickSourceReference" placeholder="Ex: Unção de Davi" />
      </label>

      <label>
        Link
        <input id="quickSourceUrl" placeholder="Opcional" />
      </label>

      <label>
        Observações
        <textarea id="quickSourceNotes" rows="3"></textarea>
      </label>

      <button type="submit" class="primary">Salvar fonte</button>
    </form>
  </div>
</div>

  <script type="module" src="app.js?v=0.3"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").then((reg) => {
          reg.update();
        });
      });
    }
  </script>
</body>
</html>
